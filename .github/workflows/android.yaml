name: Android Build

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (with submodules)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Nucleus
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Patch SeforimLibrary AGP version
        run: sed -i 's/agp = "8.12.3"/agp = "9.1.0"/' SeforimLibrary/gradle/libs.versions.toml

      - name: Build Android Debug APK
        run: ./gradlew :androidApp:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: android-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 14
